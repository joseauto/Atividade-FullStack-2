<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechForge | Contato</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1 class="logo">TechForge</h1>
            <nav>
                <ul class="menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html" class="active">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="contato-wrapper">
            <div class="form-box">
                <h2>Fale com a gente</h2>
                <form action="#" method="POST">
                    <div class="input-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="mensagem">Mensagem</label>
                        <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como podemos ajudar?" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit">Enviar Mensagem</button>
                </form>
            </div>

            <div class="info-box">
                <h3>Nossos Canais</h3>
                <p>Prefere outro meio de contato? Estamos à disposição nas plataformas abaixo:</p>
                <ul class="contato-links">
                    <li>🔗 <a href="https://instagram.com" target="_blank">Nosso Instagram</a></li>
                    <li>✉️ <a href="mailto:contato@techforge.com.br">contato@techforge.com.br</a></li>
                    <li>📞 <a href="tel:+5571999999999">(71) 99999-9999</a></li>
                </ul>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 TechForge - Escola de Robótica. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
